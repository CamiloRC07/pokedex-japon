<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Tienda online de peluches, figuras, TCG y gachapon. Importados desde Japón." />
  <link rel="manifest" href="public/manifest.json" />
  <!-- Open Graph (WhatsApp, Facebook, Discord) -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Yanmega Ofertas" />
  <meta property="og:description" content="Peluches, figuras, TCG y gachapon de Pokémon Center Japón." />
  <meta property="og:image"       content="https://pokedex.yanmegaofertas.cl/public/og-image.png" />
  <meta property="og:url"         content="https://pokedex.yanmegaofertas.cl/" />
  <!-- Twitter/X -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Yanmega Ofertas" />
  <meta name="twitter:description" content="Peluches, figuras, TCG y gachapon de Pokémon Center Japón." />
  <meta name="twitter:image"       content="https://pokedex.yanmegaofertas.cl/public/og-image.png" />
  <meta name="theme-color" content="#769856" />
  <title>Yanmega Ofertas</title>
  <link rel="canonical" href="https://pokedex.yanmegaofertas.cl/" />
  <link rel="apple-touch-icon" href="public/240x240.png" />
  <link rel="icon" type="image/x-icon" href="public/favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
        TOKENS & RESET
    ============================================================ */
    :root {
      --color-bg:           #FFFFFF;
      --color-surface:      #F5F5F5;
      --color-surface-2:    #ECECEC;
      --color-border:       #E0E0E0;
      --color-text:         #1A1A1A;
      --color-text-muted:   #6B6B6B;
      --color-accent:       #769856;
      --color-accent-hover: #5C7A3E;
      --color-accent-light: #EBF0E5;
      --color-danger:       #C0392B;

      --font-base: 'DM Sans', sans-serif;

      --radius-sm:  6px;
      --radius-md:  12px;
      --radius-lg:  18px;
      --radius-xl:  24px;
      --radius-full: 9999px;

      --shadow-sm:  0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md:  0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
      --shadow-lg:  0 12px 32px rgba(0,0,0,.10), 0 4px 8px rgba(0,0,0,.04);

      --transition: 180ms ease;

      --header-h: 64px;
      --max-w: 1280px;
      --gutter: clamp(16px, 4vw, 40px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-base);
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }

    img {
      display: block;
      max-width: 100%;
      user-select: none;
      /* -webkit-user-drag: none; */
    }

    button {
      cursor: pointer;
      font-family: inherit;
      border: none;
      background: none;
    }

    a { color: inherit; text-decoration: none; }

    ul, ol { list-style: none; }

    strong { color: var(--color-accent); }

    /* ============================================================
        TYPOGRAPHY SCALE
    ============================================================ */
    .text-xs    { font-size: 12px; line-height: 1.4; }
    .text-sm    { font-size: 14px; line-height: 1.5; }
    .text-base  { font-size: 16px; line-height: 1.6; }
    .text-lg    { font-size: 18px; line-height: 1.5; font-weight: 500; }
    .text-xl    { font-size: 22px; line-height: 1.3; font-weight: 600; }
    .text-2xl   { font-size: 28px; line-height: 1.2; font-weight: 600; }
    .text-3xl   { font-size: 36px; line-height: 1.15; font-weight: 700; }

    .text-muted  { color: var(--color-text-muted); }
    .text-accent { color: var(--color-accent); }
    .font-medium { font-weight: 500; }
    .font-semibold { font-weight: 600; }

    /* ============================================================
        LAYOUT UTILITIES
    ============================================================ */
    .container {
      width: 100%;
      max-width: var(--max-w);
      margin-inline: auto;
      padding-inline: var(--gutter);
    }

    /* ============================================================
        HEADER
    ============================================================ */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border);
    }

    .header__inner {
      height: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header__logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .header__logo-img {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-full);
      object-fit: cover;
      background: var(--color-surface);
    }

    /* placeholder mientras no hay logo */
    .header__logo-placeholder {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-full);
      background: var(--color-accent-light);
      border: 2px solid var(--color-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--color-accent);
      flex-shrink: 0;
    }

    .header__store-name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -.01em;
      white-space: nowrap;
    }

    .header__search-wrap {
      flex: 1;
      max-width: 440px;
      margin-inline: auto;
    }

    .search-input {
      width: 100%;
      height: 40px;
      padding: 0 16px 0 40px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-full);
      font-family: inherit;
      font-size: 14px;
      background: var(--color-surface);
      color: var(--color-text);
      transition: border-color var(--transition), background var(--transition);
      outline: none;
    }

    .search-input:focus {
      border-color: var(--color-accent);
      background: var(--color-bg);
    }

    .search-input::placeholder { color: var(--color-text-muted); }

    .search-wrap {
      position: relative;
    }

    .search-wrap__icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-muted);
      pointer-events: none;
    }

    /* ============================================================
        NAVIGATION TABS (categorías)
    ============================================================ */
    .category-nav {
      border-bottom: 1px solid var(--color-border);
      background: var(--color-bg);
    }

    .category-nav__list {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .category-nav__list::-webkit-scrollbar { display: none; }

    .category-nav__item {
      flex-shrink: 0;
    }

    .category-nav__btn {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0 8px;
      padding: 0 8px;
      height: 48px;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-muted);
      border-bottom: 2px solid transparent;
      transition: color var(--transition), border-color var(--transition);
      white-space: nowrap;
    }

    .category-nav__btn svg {
      width: 14px;
      height: 14px;
    }

    .category-nav__btn:hover {
      color: var(--color-accent);
    }

    .category-nav__btn.active {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
    }

    .category-nav__icon {
      font-size: 16px;
    }

    /* ============================================================
        MAIN CONTENT AREA
    ============================================================ */
    .main {
      min-height: calc(100dvh - var(--header-h));
      padding-block: 32px 64px;
    }

    /* ============================================================
        SECTION HEADER
    ============================================================ */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-header__title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      display: flex;
      gap: .5rem;
      text-align: center;
    }

    .section-header__title svg {
      width: 20px;
      height: 20px;
      align-self: center;
    }

    .section-header__count {
      font-size: 13px;
      color: var(--color-text-muted);
    }

    /* ============================================================
        PRODUCT GRID
    ============================================================ */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 20px;
    }

    @media (min-width: 900px) {
      .product-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 24px;
      }
    }

    @media (min-width: 1280px) {
      .product-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 32px;
      }
    }

    /* ============================================================
        PRODUCT CARD
    ============================================================ */
    .product-card {
      background: var(--color-bg);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      border-color: var(--color-accent);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .product-card:active {
      opacity: .92;
      transform: translateY(0);
    }

    .product-card__img-wrap {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--color-surface);
      position: relative;
    }

    .product-card__img-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(118, 152, 86, 0);
      transition: background 220ms ease;
      pointer-events: none;
    }

    .product-card:hover .product-card__img-wrap::after {
      background: rgba(118, 152, 86, .08);
    }

    .product-card__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 300ms ease;
    }

    .product-card__quick {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      opacity: 0;
      background: var(--color-accent);
      color: var(--color-bg);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      padding: 5px 14px;
      border-radius: var(--radius-full);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
      z-index: 2;
    }

    .product-card:hover .product-card__quick {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .product-card__img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: var(--color-border);
    }

    .product-card__body {
      padding: 12px 14px 14px;
      /* De aqui para abajo, revisar si queda bien flex + gap */
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .product-card__name {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      line-height: 1.4;
      /* margin-bottom: 4px; */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @media (min-width: 1280px) {
      .product-card__name {
        font-size: 14px;
        letter-spacing: .05em;
      }
    }

    .product-card__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: auto;
    }

    .product-card__price {
      font-size: 15px;
      font-weight: 700;
      color: var(--color-accent);
    }

    @media (min-width: 1280px) {
      .product-card__price {
        font-size: 16px;
      }
    }

    .product-card__out-of-stock {
      font-size: 12px;
      color: var(--color-danger);
      font-weight: 500;
    }

    /* ============================================================
        GRID CONTROLS
    ============================================================ */
    .grid-controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .grid-controls__row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .grid-controls__select-wrap,
    .grid-controls__select { display: none; } /* reemplazados por sort-dropdown */

    /* ============================================================
        SORT DROPDOWN CUSTOM
    ============================================================ */
    .sort-dropdown {
      position: relative;
      flex-shrink: 0;
    }

    /* Trigger — el botón que siempre se ve */
    .sort-dropdown__trigger {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 38px;
      padding: 0 14px;
      background: var(--color-bg);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-full);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text);
      cursor: pointer;
      white-space: nowrap;
      transition: border-color var(--transition), box-shadow var(--transition);
      user-select: none;
    }

    .sort-dropdown__trigger:hover {
      border-color: var(--color-accent);
    }

    .sort-dropdown__trigger.open {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px var(--color-accent-light);
    }

    .sort-dropdown__trigger svg {
      width: 14px;
      height: 14px;
      color: var(--color-text-muted);
      flex-shrink: 0;
    }

    .sort-dropdown__chevron {
      display: flex;
      align-items: center;
      margin-left: 2px;
      transition: transform 220ms ease;
    }

    .sort-dropdown__trigger.open .sort-dropdown__chevron {
      transform: rotate(180deg);
    }

    /* Panel flotante */
    .sort-dropdown__panel {
      display: none; /* JS añade .open para mostrar */
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 100%;
      background: var(--color-bg);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      z-index: 200;
      overflow: hidden;
      list-style: none;
      padding: 4px;

      /* Animación de entrada */
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 150ms ease, transform 150ms ease;
    }

    .sort-dropdown__panel.open {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    .sort-dropdown__option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-muted);
      border-radius: calc(var(--radius-md) - 4px);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      outline: none;
    }

    .sort-dropdown__option:hover,
    .sort-dropdown__option:focus {
      background: var(--color-surface);
      color: var(--color-text);
    }

    .sort-dropdown__option.active {
      color: var(--color-accent);
      font-weight: 600;
    }

    /* Check — solo visible en la opción activa */
    .sort-dropdown__option-check {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      color: var(--color-accent);
      opacity: 0;
    }

    .sort-dropdown__option-check svg {
      width: 14px;
      height: 14px;
    }

    .sort-dropdown__option.active .sort-dropdown__option-check {
      opacity: 1;
    }

    /* Select nativo — oculto en desktop, visible solo en mobile como overlay invisible */
    .sort-dropdown__native {
      display: none; /* hidden by default */
    }

    @media (max-width: 768px) {
      /* En mobile: ocultamos el panel custom y exponemos el select nativo
         superpuesto sobre el trigger para que el tap lo active */
      .sort-dropdown__panel { display: none !important; }

      .sort-dropdown__native {
        display: block;
        position: absolute;
        inset: 0;
        opacity: 0;
        width: 100%;
        height: 100%;
        cursor: pointer;
        font-size: 16px; /* evita zoom en iOS */
      }
    }

    .grid-controls__toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .grid-controls__toggle input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .grid-controls__toggle-track {
      width: 36px;
      height: 20px;
      border-radius: var(--radius-full);
      background: var(--color-border);
      position: relative;
      flex-shrink: 0;
      transition: background var(--transition);
    }

    .grid-controls__toggle-track::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      top: 3px;
      left: 3px;
      transition: transform var(--transition);
    }

    .grid-controls__toggle input:checked + .grid-controls__toggle-track {
      background: var(--color-accent);
    }

    .grid-controls__toggle input:checked + .grid-controls__toggle-track::after {
      transform: translateX(16px);
    }

    .grid-controls__toggle-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-muted);
    }

    .grid-controls__chips {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(7, 1fr);
      overflow-x: scroll;
    }

    @media (min-width: 640px) {
      .grid-controls__chips {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(8, 1fr);
        overflow-x: visible;
      }
    }

    .grid-chip {
      padding: 5px 14px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      border: 1.5px solid var(--color-border);
      background: var(--color-bg);
      color: var(--color-text-muted);
      transition: all var(--transition);
      cursor: pointer;
      letter-spacing: .03em;
    }

    .grid-chip:hover { border-color: var(--color-accent); color: var(--color-accent); }

    .grid-chip.active {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #fff;
    }

    .grid-tag-chip {
      padding: 5px 12px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 500;
      border: 1.5px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-muted);
      transition: all var(--transition);
      cursor: pointer;
    }

    .grid-tag-chip:hover { border-color: var(--color-accent); color: var(--color-text); }

    .grid-tag-chip.active {
      border-color: var(--color-accent);
      background: var(--color-accent-light);
      color: var(--color-accent);
    }

    .grid-results-count {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 16px;
    }

    /* ============================================================
        LOAD MORE
    ============================================================ */
    .load-more-wrap {
      display: flex;
      justify-content: center;
      padding-top: 32px;
    }

    .load-more-btn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 0 32px;
      height: auto;
      padding-block: 12px;
    }

    .load-more-btn__count {
      font-size: 11px;
      font-weight: 400;
      color: var(--color-text-muted);
    }

    /* Badge */
    .badge-strip {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-wrap: nowrap;
    }
    .badge-strip::-webkit-scrollbar { display: none; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .03em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge--new     { background: var(--color-accent);  color: #fff; }
    .badge--out     { background: var(--color-surface-2); color: var(--color-text-muted); }
    .badge--sale    { background: #E8F0FE; color: #1A73E8; }
    .badge--japan   { background: #FCE8E8; color: #C0392B; }
    .badge--china   { background: #FEF3E2; color: #E67E22; }
    .badge--default { background: var(--color-surface-2); color: var(--color-text-muted); }

    /* ============================================================
        CATEGORY CARDS (Landing)
    ============================================================ */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    @media (min-width: 640px) {
      .category-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .category-card {
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--color-border);
      background: var(--color-surface);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition), transform var(--transition);
      text-align: center;
    }

    .category-card:hover {
      border-color: var(--color-accent);
      background: var(--color-accent-light);
      box-shadow: var(--shadow-sm);
      transform: translateY(-2px);
    }

    .category-card__icon {
      font-size: 36px;
      line-height: 1;
    }

    .category-card__icon svg {
      width: 32px;
      height: 32px;
      color: var(--color-accent);
    }

    .category-card__label {
      font-size: 14px;
      color: var(--color-text);
      font-weight: 600;
      letter-spacing: -.01em;
    }

    .category-card__count {
      font-size: 12px;
      color: var(--color-text-muted);
    }

    /* ============================================================
        HERO STRIP (Landing)
    ============================================================ */
    .hero-strip {
      padding-block: 32px 28px;
      margin-bottom: 8px;
    }

    .hero-strip__eyebrow {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 8px;
    }

    .hero-strip__title {
      font-size: clamp(26px, 5vw, 40px);
      font-weight: 700;
      letter-spacing: -.03em;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .hero-strip__sub {
      font-size: 15px;
      color: var(--color-text-muted);
      max-width: 480px;
    }

    /* ============================================================
        PRODUCT DETAIL
    ============================================================ */
    .product-detail {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 720px) {
      .product-detail {
        grid-template-columns: 1fr 1fr;
        gap: 48px;
      }
    }

    .product-detail__gallery {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .product-detail__main-img {
      aspect-ratio: 1 / 1;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--color-surface);
      transition: box-shadow 0.3s ease-in-out;
    }

    .gallery-track {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      height: 100%;
      border-radius: var(--radius-lg);
    }

    .gallery-track::-webkit-scrollbar { display: none; }

    .gallery-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      height: 100%;
      overflow: hidden;
    }

    .gallery-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none; /* evita drag de imagen que interfiere con swipe */
    }

    .gallery-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 2;
    }

    .gallery-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,.5);
      border: none;
      padding: 0;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
    }

    .gallery-dot.active {
      background: #fff;
      transform: scale(1.25);
    }

    /* En desktop los dots se ocultan — las thumbnails ya cumplen esa función */
    @media (min-width: 720px) {
      .gallery-dots { display: none; }
    }

    /* .product-detail__main-img:hover {
      outline: 1.5px solid var(--color-border);
      box-shadow: 0 0 0 3px var(--color-border);
    } */

    .product-detail__main-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-detail__thumbs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .product-detail__thumb {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 2px solid var(--color-border);
      cursor: pointer;
      background: var(--color-surface);
      transition: border-color var(--transition);
      flex-shrink: 0;
    }

    .product-detail__thumb.active,
    .product-detail__thumb:hover {
      border-color: var(--color-accent);
    }

    .product-detail__thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-detail__info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .product-detail__name {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      line-height: 1.2;
    }

    .product-detail__sep {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .product-detail__price {
      font-size: 26px;
      font-weight: 700;
      color: var(--color-accent);
    }

    .product-detail__desc {
      font-size: 15px;
      color: var(--color-text-muted);
      line-height: 1.7;
    }

    .product-detail__meta {
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .product-detail__meta-row {
      display: flex;
      border-bottom: 1px solid var(--color-border);
      font-size: 14px;
    }

    .product-detail__meta-row:last-child {
      border-bottom: none;
    }

    .product-detail__meta-key {
      width: 120px;
      flex-shrink: 0;
      padding: 10px 14px;
      font-weight: 500;
      background: var(--color-surface);
      color: var(--color-text-muted);
    }

    .product-detail__meta-val {
      padding: 10px 14px;
    }

    /* ============================================================
        BUTTONS
    ============================================================ */
    .share-btn {
      border-radius: var(--radius-full);
      padding: 10px;
      line-height: 0;
      background: transparent;
      color: var(--color-text-muted);
      outline: 1.5px solid var(--color-border);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .share-btn:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .share-btn:active {
      transform: translateY(0);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 24px;
      height: 48px;
      border-radius: var(--radius-full);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      white-space: nowrap;
      letter-spacing: -.01em;
    }

    .btn-primary {
      background: var(--color-accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--color-accent-hover);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      background: var(--color-border);
      color: var(--color-text-muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-ghost {
      background: transparent;
      color: var(--color-text-muted);
      border: 1.5px solid var(--color-border);
    }

    .btn-ghost:hover {
      border-color: var(--color-text);
      color: var(--color-text);
    }

    .btn-full { width: 100%; }

    .btn-icon {
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: var(--radius-full);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* ============================================================
        BACK BUTTON
    ============================================================ */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--color-text-muted);
      font-size: 14px;
      font-weight: 500;
      padding: 6px 0;
      margin-bottom: 20px;
      transition: color var(--transition);
    }

    .back-btn:hover { color: var(--color-text); }

    /* ============================================================
       EMPTY STATE
    ============================================================ */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--color-text-muted);
    }

    .empty-state__icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state__title {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 8px;
    }

    .empty-state__text {
      font-size: 14px;
      max-width: 300px;
      margin-inline: auto;
    }

    /* ============================================================
        SEARCH RESULTS HEADER
    ============================================================ */
    .search-results-label {
      font-size: 14px;
      color: var(--color-text-muted);
      margin-bottom: 20px;
    }

    .search-results-label strong {
      color: var(--color-text);
    }

    /* ============================================================
        DIVIDER
    ============================================================ */
    .divider {
      border: none;
      border-top: 1px solid var(--color-border);
      margin-block: 32px;
    }

    /* ============================================================
        FOOTER
    ============================================================ */
    .footer {
      border-top: 1px solid var(--color-border);
      padding-block: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--color-text-muted);
    }

    /* ============================================================
        NOVEDADES STRIP (horizontal scroll en landing)
    ============================================================ */
    .novedades-strip {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding-bottom: 8px;
      padding-top: 8px;
      scrollbar-width: none;
    }

    .novedades-strip::-webkit-scrollbar { display: none; }

    .novedades-strip .product-card {
      flex-shrink: 0;
      width: 180px;
    }

    /* ============================================================
        SKELETON LOADER
    ============================================================ */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, var(--color-surface) 25%, var(--color-surface-2) 50%, var(--color-surface) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius-md);
    }

    /* ============================================================
        PRICE FORMAT HELPER (se aplica via JS)
    ============================================================ */
    .price-clp::before { content: '$'; }

    /* ============================================================
        RESPONSIVE TWEAKS
    ============================================================ */
    @media (max-width: 480px) {
      .header__store-name { display: none; }
    }

    /* ============================================================
        PAGE TRANSITIONS
    ============================================================ */
    .view {
      animation: fadeUp 200ms ease both;
    }

    /* ============================================================
        TOAST
    ============================================================ */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--color-text);
      color: #fff;
      padding: 10px 20px;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 200ms ease, transform 200ms ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }
    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
      INFO NAV (navbar interna vista informativa)
    ============================================================ */
    .info-nav {
      position: sticky;
      top: var(--header-h);
      z-index: 90;
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 40px;
    }

    .info-nav__list {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      gap: 0;
    }

    .info-nav__list::-webkit-scrollbar { display: none; }

    .info-nav__btn {
      flex-shrink: 0;
      padding: 0 20px;
      height: 44px;
      font-size: 13px;
      letter-spacing: 1px;
      font-weight: 500;
      color: var(--color-text-muted);
      border-bottom: 2px solid transparent;
      transition: color var(--transition), border-color var(--transition);
      white-space: nowrap;
    }

    .info-nav__btn:hover { color: var(--color-text); }
    .info-nav__btn.active {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
    }

    /* ============================================================
      INFO SECTIONS
    ============================================================ */
    .info-section {
      margin-bottom: 64px;
      scroll-margin-top: calc(var(--header-h) + 44px + 24px);
    }

    .info-section__title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -.02em;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1.5px solid var(--color-border);
    }

    /* ============================================================
      HOW TO BUY — pasos
    ============================================================ */
    .steps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .step-card {
      background: var(--color-surface);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .step-card__number {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-full);
      background: var(--color-accent);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-card__title {
      font-size: 15px;
      font-weight: 600;
    }

    .step-card__desc {
      font-size: 13px;
      color: var(--color-text-muted);
      line-height: 1.6;
    }

    /* ============================================================
      DELIVERY CARDS
    ============================================================ */
    .delivery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .delivery-card {
      background: var(--color-surface);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .delivery-card svg {
      width: 22px;
      height: 22px;
      color: var(--color-accent);
    }

    .delivery-card__label {
      font-size: 14px;
      font-weight: 600;
    }

    .delivery-card__desc {
      font-size: 13px;
      color: var(--color-text-muted);
      line-height: 1.5;
    }

    /* ============================================================
      PAYMENT CHIPS
    ============================================================ */
    .payment-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .payment-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--color-surface);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 500;
    }

    .payment-chip svg {
      width: 16px;
      height: 16px;
      color: var(--color-accent);
    }

    .payment-chip__soon {
      font-size: 11px;
      color: var(--color-text-muted);
      font-weight: 400;
    }

    /* ============================================================
      FAQ ACORDEÓN
    ============================================================ */
    .faq-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .faq-item {
      border-bottom: 1px solid var(--color-border);
    }

    .faq-item:last-child { border-bottom: none; }

    .faq-item__btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px;
      text-align: left;
      font-size: 14px;
      font-weight: 500;
      background: var(--color-bg);
      color: var(--color-text);
      transition: background var(--transition);
    }

    .faq-item__btn:hover { background: var(--color-surface); }

    .faq-item__btn svg {
      width: 16px;
      height: 16px;
      color: var(--color-text-muted);
      flex-shrink: 0;
      transition: transform 250ms ease;
    }

    .faq-item.open .faq-item__btn svg {
      transform: rotate(180deg);
    }

    .faq-item__body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 300ms ease-in, padding 300ms ease-in;
      padding: 0 16px;
    }

    .faq-item.open .faq-item__body {
      max-height: 400px;
      padding: 8px 16px;
    }

    .faq-item__body p {
      font-size: 14px;
      color: var(--color-text-muted);
      line-height: 1.7;
    }

    /* ============================================================
      ABOUT
    ============================================================ */
    .about-wrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 640px) {
      .about-wrap.has-image {
        grid-template-columns: 200px 1fr;
        align-items: center;
      }
    }

    .about-img {
      width: 200px;
      height: 200px;
      border-radius: var(--radius-xl);
      object-fit: cover;
      border: 1.5px solid var(--color-border);
    }

    .about-text {
      font-size: 15px;
      color: var(--color-text-muted);
      line-height: 1.8;
    }

    /* ============================================================
      INFO STRIP (landing → CTA vista info)
    ============================================================ */
    .info-strip {
      background: var(--color-accent);
      border-radius: var(--radius-xl);
      padding: 32px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 48px;
      justify-content: center;
    }

    @media (min-width: 640px) {
      .info-strip {
        justify-content: space-between;
      }
    }

    .info-strip__text {
      color: #fff;
    }

    .info-strip__title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .info-strip__sub {
      font-size: 14px;
      opacity: .85;
    }

    .info-strip__btn {
      background: #fff;
      color: var(--color-accent);
      padding: 0 22px;
      height: 44px;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity var(--transition), transform var(--transition);
      display: inline-flex;
      align-items: center;
    }

    .info-strip__btn:hover {
      opacity: .92;
      transform: translateY(-1px);
    }

    /* ============================================================
      ENCARGOS SECTION (landing)
    ============================================================ */
    .encargos-card {
      background: var(--color-surface);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 32px 28px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 640px) {
      .encargos-card {
        grid-template-columns: 1fr auto;
        align-items: center;
      }
    }

    .encargos-card__title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .encargos-card__desc {
      font-size: 14px;
      color: var(--color-text-muted);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .encargos-card__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      /* overflow-x: scroll; */
    }

    .encargos-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--color-accent-light);
      color: var(--color-accent);
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
    }

    .encargos-chip svg {
      width: 13px;
      height: 13px;
    }

    @media (min-width: 640px) {
      .encargos-card__meta {
        justify-content: start;
      }
    }

    /* ============================================================
      COLECCIONES (landing)
    ============================================================ */
    .colecciones-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (min-width: 640px) {
      .colecciones-grid {
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      }
    }

    .coleccion-card {
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--color-border);
      background: var(--color-surface);
      overflow: hidden;
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
    }

    .coleccion-card:hover {
      border-color: var(--color-accent);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .coleccion-card__cover {
      aspect-ratio: 1 / 1;
      background: var(--color-surface-2);
      overflow: hidden;
      position: relative;
    }

    .coleccion-card__cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .coleccion-card__cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .coleccion-card__cover-placeholder svg {
      width: 32px;
      height: 32px;
      color: var(--color-border);
    }

    .coleccion-card__body {
      padding: 8px 16px;
    }

    .coleccion-card__name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: .1rem;
    }

    .coleccion-card__count {
      font-size: 12px;
      color: var(--color-text-muted);
    }

    /* ============================================================
      DESTACADOS (landing) — reutiliza novedades-strip
      Solo necesita el override de ancho de card
    ============================================================ */
    .destacados-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (min-width: 900px) {
      .destacados-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
    /* ============================================================
      VER TODAS CARD
    ============================================================ */
    .ver-todas-card { border-style: dashed; }

    .ver-todas-card__img {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-accent-light) !important;
    }

    .ver-todas-card__inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--color-accent);
    }

    .ver-todas-card__inner svg {
      width: 28px;
      height: 28px;
    }

    .ver-todas-card__label {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-accent);
    }

  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container header__inner">
      <a href="/" class="header__logo" id="js-home-link">
        <img class="header__logo-img" src="public/yanmega-logo-big.png" alt="Logo" />
        <span class="header__store-name" id="js-store-name"></span>
      </a>

      <!-- Buscador -->
